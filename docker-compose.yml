services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groweasy-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - FRONTEND_ORIGIN=http://localhost:3000
      - AI_PROVIDER=${AI_PROVIDER:-cerebras}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-3.1-flash-lite-preview}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-zai-org/GLM-5.2:novita}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-gemma-4-31b}
      - MONGODB_URI=${MONGODB_URI}
      - AI_BATCH_SIZE=${AI_BATCH_SIZE:-5}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - AI_RETRY_BASE_DELAY_MS=${AI_RETRY_BASE_DELAY_MS:-1000}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: groweasy-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend

volumes:
  backend-uploads:
